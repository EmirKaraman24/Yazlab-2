# Proje Konfigürasyon Dosyası
# Hard-coded değer kullanımını önlemek için tüm parametreler buradan okunacaktır.

data:
  skab_path: "data"
  batadal_path: "data/BATADAL/BATADAL_dataset04.csv"
  random_seeds: [42, 123, 2026, 7, 999]

preprocessing:
  n_splits: 5                          # GroupKFold fold sayısı (SKAB source_file bazında)
  batadal_split_ratios: [0.60, 0.20, 0.20]  # Kronolojik bölme: train / val / test
  pca_n_components: 1                  # Otomata girdisi için PCA bileşen sayısı (PC1)
  gaussian_noise_std: 0.1              # Gürültülü veri senaryosu için Gaussian standart sapması

automata_params:
  # Sabit parametreler (Karşılaştırma için)
  window_size_fixed: 4
  alphabet_size_fixed: 3
  
  # Parametre varyasyonları
  window_sizes: [3, 4, 5, 6]
  alphabet_sizes: [3, 4, 5, 6]

deep_learning_params:
  models_to_run: ["LSTM", "1D-CNN"]
  epochs: 50
  batch_size: 32
  early_stopping_patience: 5
  learning_rate: 0.001            # Adam optimizer öğrenme hızı

  # 1D-CNN mimarisi parametreleri
  cnn_filters: 64                 # İlk Conv1D katmanındaki filtre sayısı (blok 2'de 2x kullanılır)
  cnn_kernel_size: 3              # Evrişim penceresi boyutu
  cnn_pool_size: 2                # MaxPooling penceresi boyutu
  cnn_dense_units: 64             # Tam bağlantılı gizli katman nöron sayısı
  cnn_dropout_rate: 0.3           # Dropout oranı (aşırı öğrenme önleme)

  # LSTM mimarisi parametreleri
  lstm_units: 64                  # LSTM katmanındaki nöron sayısı
  lstm_dropout_rate: 0.3          # LSTM sonrası dropout oranı
  lstm_dense_units: 32            # Çıkış öncesi gizli katman nöron sayısı

experiment_scenarios:
  run_original: true
  run_noisy: true
  run_unseen: true
